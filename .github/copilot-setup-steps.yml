name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - packages/*/package.json
      - packages/api/prisma/**
      - infrastructure/**
  pull_request:
    paths:
      - .github/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - packages/*/package.json
      - packages/api/prisma/**
      - infrastructure/**

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Use npm 10.9.2
        run: npm install --global npm@10.9.2

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: packages/api
        run: npx prisma generate

      - name: Install Azure Bicep CLI
        shell: bash
        run: |
          curl -fsSL -o bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

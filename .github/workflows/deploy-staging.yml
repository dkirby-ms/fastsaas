name: Deploy staging

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: Azure resource group for staging
        required: false
        default: rg-fastsaas-staging
      location:
        description: Azure region
        required: false
        default: eastus
      environmentName:
        description: Logical environment name
        required: false
        default: staging
      imageTag:
        description: Image tag to deploy or roll back to
        required: false
        default: ''
      skipBuild:
        description: Skip docker build and reuse an existing image tag
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      RESOURCE_GROUP: ${{ inputs.resourceGroup || 'rg-fastsaas-staging' }}
      LOCATION: ${{ inputs.location || 'eastus' }}
      ENVIRONMENT_NAME: ${{ inputs.environmentName || 'staging' }}
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.STAGING_POSTGRES_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment values
        shell: bash
        run: |
          if [ -n "${{ inputs.imageTag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.imageTag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi
          echo "SKIP_BUILD=${{ inputs.skipBuild }}" >> "$GITHUB_ENV"

      - name: Ensure resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Bootstrap shared infrastructure
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "staging-bootstrap-${GITHUB_RUN_ID}" \
            --template-file infrastructure/bicep/main.bicep \
            --parameters @infrastructure/bicep/main.parameters.example.json \
            --parameters location="$LOCATION" environmentName="$ENVIRONMENT_NAME" deployContainerApps=false postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD"

      - name: Read infrastructure outputs
        id: bootstrap
        shell: bash
        run: |
          ACR_NAME=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "staging-bootstrap-${GITHUB_RUN_ID}" --query properties.outputs.acrName.value -o tsv)
          ACR_LOGIN_SERVER=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "staging-bootstrap-${GITHUB_RUN_ID}" --query properties.outputs.acrLoginServer.value -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        if: env.SKIP_BUILD != 'true'
        run: az acr login --name "${{ steps.bootstrap.outputs.acr_name }}"

      - name: Build and push API image
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          docker build --file packages/api/Dockerfile --target runtime --build-arg SERVICE_NAME=api --build-arg SERVICE_PORT=3000 --tag "${{ steps.bootstrap.outputs.acr_login_server }}/fastsaas-api:${IMAGE_TAG}" .
          docker push "${{ steps.bootstrap.outputs.acr_login_server }}/fastsaas-api:${IMAGE_TAG}"

      - name: Build and push portal image
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          docker build --file packages/portal/Dockerfile --target runtime --build-arg SERVICE_NAME=portal --build-arg SERVICE_PORT=3001 --tag "${{ steps.bootstrap.outputs.acr_login_server }}/fastsaas-portal:${IMAGE_TAG}" .
          docker push "${{ steps.bootstrap.outputs.acr_login_server }}/fastsaas-portal:${IMAGE_TAG}"

      - name: Deploy container apps
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "staging-release-${GITHUB_RUN_ID}" \
            --template-file infrastructure/bicep/main.bicep \
            --parameters @infrastructure/bicep/main.parameters.example.json \
            --parameters location="$LOCATION" environmentName="$ENVIRONMENT_NAME" deployContainerApps=true apiImageTag="$IMAGE_TAG" portalImageTag="$IMAGE_TAG" postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD"

      - name: Read application endpoints
        id: release
        shell: bash
        run: |
          API_URL=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "staging-release-${GITHUB_RUN_ID}" --query properties.outputs.apiUrl.value -o tsv)
          PORTAL_URL=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "staging-release-${GITHUB_RUN_ID}" --query properties.outputs.portalUrl.value -o tsv)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "portal_url=$PORTAL_URL" >> "$GITHUB_OUTPUT"

      - name: Verify health checks
        shell: bash
        run: |
          curl --fail --show-error --silent --retry 20 --retry-delay 15 "${{ steps.release.outputs.api_url }}/health"
          curl --fail --show-error --silent --retry 20 --retry-delay 15 "${{ steps.release.outputs.portal_url }}/health"

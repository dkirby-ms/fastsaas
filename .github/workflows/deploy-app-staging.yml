name: Deploy staging application

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: Azure resource group for staging
        required: false
        default: rg-fastsaas-staging
      location:
        description: Azure region
        required: false
        default: centralus
      environmentName:
        description: Logical environment name
        required: false
        default: staging
      imageTag:
        description: Image tag to deploy or roll back to
        required: false
        default: ''
      skipBuild:
        description: Skip docker build and reuse an existing image tag
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    environment: staging
    env:
      RESOURCE_GROUP: ${{ inputs.resourceGroup || 'rg-fastsaas-staging' }}
      LOCATION: ${{ inputs.location || 'centralus' }}
      ENVIRONMENT_NAME: ${{ inputs.environmentName || 'staging' }}
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.STAGING_POSTGRES_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment values
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ inputs.imageTag }}
          SKIP_BUILD_INPUT: ${{ inputs.skipBuild }}
        run: |
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            if [[ ! "$IMAGE_TAG_INPUT" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
              echo "imageTag must match ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$" >&2
              exit 1
            fi
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG_INPUT" >> "$GITHUB_ENV"
          else
            printf 'IMAGE_TAG=%s\n' "$GITHUB_SHA" >> "$GITHUB_ENV"
          fi

          printf 'SKIP_BUILD=%s\n' "$SKIP_BUILD_INPUT" >> "$GITHUB_ENV"

      - name: Resolve staging registry
        id: registry
        shell: bash
        run: |
          if [ "$(az group exists --name "$RESOURCE_GROUP")" != "true" ]; then
            echo "Resource group $RESOURCE_GROUP does not exist. Run the infrastructure workflow first." >&2
            exit 1
          fi

          ACR_COUNT=$(az acr list --resource-group "$RESOURCE_GROUP" --query 'length(@)' -o tsv)
          if [ "$ACR_COUNT" -eq 0 ]; then
            echo "No Azure Container Registry found in $RESOURCE_GROUP. Run the infrastructure workflow first." >&2
            exit 1
          fi

          if [ "$ACR_COUNT" -ne 1 ]; then
            echo "Expected exactly one Azure Container Registry in $RESOURCE_GROUP, found $ACR_COUNT." >&2
            az acr list --resource-group "$RESOURCE_GROUP" --query '[].name' -o tsv >&2
            exit 1
          fi

          ACR_NAME=$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv)
          ACR_LOGIN_SERVER=$(az acr show --resource-group "$RESOURCE_GROUP" --name "$ACR_NAME" --query loginServer -o tsv)

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

          {
            echo "## Staging application deployment"
            echo "- ACR name: \`$ACR_NAME\`"
            echo "- ACR login server: \`$ACR_LOGIN_SERVER\`"
            echo "- Image tag: \`${IMAGE_TAG:-$GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build API image in ACR
        if: env.SKIP_BUILD != 'true'
        run: |
          az acr build \
            --registry "${{ steps.registry.outputs.acr_name }}" \
            --image "fastsaas-api:${IMAGE_TAG}" \
            --file packages/api/Dockerfile \
            .

      - name: Build portal image in ACR
        if: env.SKIP_BUILD != 'true'
        run: |
          az acr build \
            --registry "${{ steps.registry.outputs.acr_name }}" \
            --image "fastsaas-portal:${IMAGE_TAG}" \
            --file packages/portal/Dockerfile \
            .

      - name: Deploy container apps
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "staging-app-${GITHUB_RUN_ID}" \
            --template-file infrastructure/bicep/main.bicep \
            --parameters @infrastructure/bicep/main.parameters.example.json \
            --parameters location="$LOCATION" environmentName="$ENVIRONMENT_NAME" deployContainerApps=true usePrivateEndpoints=false apiImageTag="$IMAGE_TAG" portalImageTag="$IMAGE_TAG" postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD"

      - name: Read deployment outputs
        id: deployment
        shell: bash
        env:
          DEPLOYMENT_NAME: staging-app-${{ github.run_id }}
        run: |
          API_URL=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "$DEPLOYMENT_NAME" --query properties.outputs.apiUrl.value -o tsv)
          PORTAL_URL=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "$DEPLOYMENT_NAME" --query properties.outputs.portalUrl.value -o tsv)
          API_APP_NAME=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "$DEPLOYMENT_NAME" --query properties.outputs.apiContainerAppName.value -o tsv)
          PORTAL_APP_NAME=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name "$DEPLOYMENT_NAME" --query properties.outputs.portalContainerAppName.value -o tsv)

          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "portal_url=$PORTAL_URL" >> "$GITHUB_OUTPUT"
          echo "api_app_name=$API_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "portal_app_name=$PORTAL_APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Configure API environment
        shell: bash
        env:
          CONTAINER_APP_NAME: ${{ steps.deployment.outputs.api_app_name }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          mapfile -t env_vars < <(python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          pattern = re.compile(r'\{\{([A-Z0-9_]+)\}\}')

          for raw_line in Path('infrastructure/env/staging-api.env').read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith('#'):
                  continue
              if '=' not in line:
                  raise SystemExit(f'Invalid env entry: {raw_line}')

              key, value = line.split('=', 1)

              def replace(match: re.Match[str]) -> str:
                  name = match.group(1)
                  resolved = os.environ.get(name)
                  if resolved is None:
                      raise SystemExit(f'Missing value for placeholder {name}')
                  return resolved

              value = pattern.sub(replace, value)
              print(f'{key}={value}')
          PY
          )

          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --set-env-vars "${env_vars[@]}" \
            --output none

      - name: Configure portal environment
        shell: bash
        env:
          CONTAINER_APP_NAME: ${{ steps.deployment.outputs.portal_app_name }}
          API_BASE_URL: ${{ steps.deployment.outputs.api_url }}
        run: |
          mapfile -t env_vars < <(python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          pattern = re.compile(r'\{\{([A-Z0-9_]+)\}\}')

          for raw_line in Path('infrastructure/env/staging-portal.env').read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith('#'):
                  continue
              if '=' not in line:
                  raise SystemExit(f'Invalid env entry: {raw_line}')

              key, value = line.split('=', 1)

              def replace(match: re.Match[str]) -> str:
                  name = match.group(1)
                  resolved = os.environ.get(name)
                  if resolved is None:
                      raise SystemExit(f'Missing value for placeholder {name}')
                  return resolved

              value = pattern.sub(replace, value)
              print(f'{key}={value}')
          PY
          )

          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --set-env-vars "${env_vars[@]}" \
            --output none

      - name: Verify health checks
        shell: bash
        run: |
          curl --fail --show-error --silent --retry 20 --retry-delay 15 "${{ steps.deployment.outputs.api_url }}/health"
          curl --fail --show-error --silent --retry 20 --retry-delay 15 "${{ steps.deployment.outputs.portal_url }}/health"

name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe the feature and why it would be useful.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
      placeholder: A clear and concise description of the feature request
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature valuable?
      placeholder: Explain the use case and expected benefits
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Suggested Implementation
      description: How might this feature be implemented?
      placeholder: Any ideas on how this could be implemented (optional)
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches?
      placeholder: Other ways this could be solved (optional)
      required: false

  - type: checkboxes
    id: squad
    attributes:
      label: Classification
      options:
        - label: Add `squad` label for team routing
          required: false
